        function getPersonalizedRda(profile) {
            const sex = profile?.sex === "male" || profile?.sex === "female" ? profile.sex : "female";
            const age = Number(profile?.age);
            const isMinor = Number.isFinite(age) && age > 0 && age < 18;
            const vitamin = JSON.parse(JSON.stringify(VITAMIN_RDA_BASE));
            const mineral = JSON.parse(JSON.stringify(MINERAL_RDA_BASE));

            if (sex === "male") {
                vitamin.A_ug_RAE.rda = 900;
                vitamin.B1_mg.rda = 1.4;
                vitamin.B2_mg.rda = 1.6;
                vitamin.B6_mg.rda = 1.4;
                vitamin.E_mg.rda = 7.0;
                vitamin.niacin_mg.rda = 15;
                mineral.calcium_mg.rda = 750;
                mineral.iron_mg.rda = 7.5;
                mineral.zinc_mg.rda = 11;
                mineral.magnesium_mg.rda = 370;
                mineral.potassium_mg.rda = 3000;
            }

            if (isMinor) {
                vitamin.A_ug_RAE.rda = Math.round(vitamin.A_ug_RAE.rda * 0.85);
                vitamin.B1_mg.rda = Math.round(vitamin.B1_mg.rda * 10) / 10;
                vitamin.B2_mg.rda = Math.round(vitamin.B2_mg.rda * 10) / 10;
                vitamin.B6_mg.rda = Math.round(vitamin.B6_mg.rda * 10) / 10;
                vitamin.C_mg.rda = 85;
                vitamin.D_ug.rda = 5;
                vitamin.folate_ug.rda = 220;
                mineral.calcium_mg.rda = 700;
                mineral.iron_mg.rda = sex === "male" ? 7 : 10.5;
            }
            return { vitamin, mineral };
        }

        /** APIキーはVercelサーバー側で保持し、クライアントからは直接送らない */
        async function analyzeMealWithGemini(base64Image, mimeType, profile) {
            const prompt = `あなたは日本語で答えるプロの管理栄養士です。添付の食事写真を解析し、次のルールを絶対に守って返答してください。

厳守ルール:
- 必ず「純粋なJSONオブジェクトのみ」を返すこと
- 前置き文・後置き文・説明文を絶対に出力しないこと
- Markdown記法（\`\`\`json など）を絶対に使わないこと
- JSON以外の文字を一切含めないこと

プロフィール（参考）:
- ニックネーム: ${profile?.name || "不明"}
- 現在体重: ${profile?.weight ?? "?"} kg
- 目標体重: ${profile?.goalWeight ?? "?"} kg
- 性別: ${profile?.sex === "male" ? "男性" : profile?.sex === "female" ? "女性" : "未設定"}
- 年齢: ${profile?.age ?? "未設定"}
- 目標モード: ${profile?.goalMode || "balance"}

JSONスキーマ:
{
  "menu": ["推定メニュー名"],
  "calories_kcal": number,
  "protein_g": number,
  "fat_g": number,
  "carbs_g": number,
  "vitamins": {
    "A_ug_RAE": number,
    "B1_mg": number,
    "B2_mg": number,
    "B6_mg": number,
    "B12_ug": number,
    "C_mg": number,
    "D_ug": number,
    "E_mg": number,
    "folate_ug": number,
    "niacin_mg": number
  },
  "minerals": {
    "calcium_mg": number,
    "iron_mg": number,
    "zinc_mg": number,
    "magnesium_mg": number,
    "potassium_mg": number
  },
  "vitamin_insights": [
    { "key": "C_mg", "status": "不足|適量|過多の可能性", "note": "短い解説", "food_sources": ["補える食材1","食材2"] }
  ],
  "mineral_insights": [
    { "key": "iron_mg", "status": "不足|適量|過多の可能性", "note": "短い解説", "food_sources": ["補える食材1","食材2"] }
  ],
  "lacking_nutrients": ["不足している栄養素名"],
  "recommended_foods": ["次に摂ると良い食材"],
  "substitute_suggestions": ["置き換え提案（例: カップ麺→そば+ゆで卵）"],
  "improvement_tips": ["次の食事での改善提案（短文）"],
  "confidence_score": number,
  "reminder_message": "不足栄養素の短い通知文",
  "goal_advice": "目標体重に向けた一言アドバイス（任意）",
  "meal_comment": "この食事全体のコメント（短く）"
}

ビタミン・ミネラルは写真から妥当に推定し、不明な場合は低めに推定して insights で触れてください。`;

            const res = await fetch("/api/analyze-meal", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    base64Image,
                    mimeType,
                    prompt
                })
            });
            const body = await res.json().catch(() => null);
            if (!res.ok) {
                throw new Error(body?.error || "解析に失敗しました");
            }
            if (!body?.analysis) {
                throw new Error("解析結果が空です");
            }
            return body.analysis;
        }

        async function recalculateMealByMenu(menuText, profile, baseAnalysis) {
            const res = await fetch("/api/recalculate-meal", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    menuText,
                    profile,
                    baseAnalysis
                })
            });
            const body = await res.json().catch(() => null);
            if (!res.ok) {
                throw new Error(body?.error || "再計算に失敗しました");
            }
            if (!body?.analysis) {
                throw new Error("再計算結果が空です");
            }
            return body.analysis;
        }

        function startOfToday() {
            const d = new Date();
            d.setHours(0, 0, 0, 0);
            return d;
        }

        function sumVitaminsFromMeals(meals) {
            const keys = Object.keys(VITAMIN_RDA_BASE);
            const sum = {};
            keys.forEach((k) => { sum[k] = 0; });
            meals.forEach((m) => {
                const v = m.vitamins || {};
                keys.forEach((k) => {
                    const n = Number(v[k]);
                    if (!Number.isNaN(n)) sum[k] += n;
                });
            });
            return sum;
        }
        function sumMineralsFromMeals(meals) {
            const keys = Object.keys(MINERAL_RDA_BASE);
            const sum = {};
            keys.forEach((k) => { sum[k] = 0; });
            meals.forEach((m) => {
                const minerals = m.minerals || {};
                keys.forEach((k) => {
                    const n = Number(minerals[k]);
                    if (!Number.isNaN(n)) sum[k] += n;
                });
            });
            return sum;
        }
        function micronutrientScore(totalMap, referenceMap) {
            const keys = Object.keys(referenceMap);
            if (!keys.length) return 0;
            let sumPct = 0;
            keys.forEach((k) => {
                const amount = Number(totalMap?.[k]) || 0;
                const rda = referenceMap[k].rda || 1;
                const pct = Math.max(0, Math.min(100, (amount / rda) * 100));
                sumPct += pct;
            });
            return Math.round(sumPct / keys.length);
        }

        function pfcFromMeals(meals) {
            let p = 0, f = 0, c = 0, kcal = 0;
            meals.forEach((m) => {
                p += Number(m.protein_g) || 0;
                f += Number(m.fat_g) || 0;
                c += Number(m.carbs_g) || 0;
                kcal += Number(m.calories_kcal) || 0;
            });
            return { ...pfcPercents(p, f, c), protein_g: p, fat_g: f, carbs_g: c, kcalFromMacros: kcal };
        }

        function pfcPercents(protein_g, fat_g, carbs_g) {
            const p = Number(protein_g) || 0;
            const f = Number(fat_g) || 0;
            const c = Number(carbs_g) || 0;
            const pK = p * 4, fK = f * 9, cK = c * 4;
            const denom = pK + fK + cK;
            if (denom <= 0) return { pPct: 0, fPct: 0, cPct: 0 };
            return {
                pPct: Math.round((pK / denom) * 100),
                fPct: Math.round((fK / denom) * 100),
                cPct: Math.round((cK / denom) * 100)
            };
        }

        function suggestedDailyCalories(profile) {
            const w = Number(profile?.weight);
            const gw = Number(profile?.goalWeight);
            if (!Number.isFinite(w)) return 1800;
            let base = Math.round(w * 28);
            if (profile?.goalMode === "cut") base -= 250;
            if (profile?.goalMode === "bulk") base += 250;
            if (Number.isFinite(gw) && gw < w - 0.5) base = Math.max(1200, base - 300);
            if (Number.isFinite(gw) && gw > w + 0.5) base = base + 200;
            return base;
        }

        function App() {
            const [user, setUser] = React.useState(null);
            const [profile, setProfile] = React.useState(null);

        function PfcBars({ pPct, fPct, cPct }) {
            return (
                <div className="space-y-2">

        function VitaminGrid({ vitamins, insights, title, referenceMap = VITAMIN_RDA_BASE }) {
            const keys = Object.keys(referenceMap);
            return (
                <div className="space-y-3">
                    {title && <p className="text-xs font-bold text-slate-400">{title}</p>}
                    <div className="grid gap-2">
                        {keys.map((key) => {
                            const meta = referenceMap[key];
                            const amount = Number(vitamins?.[key]) || 0;
                            const pct = Math.min(200, Math.round((amount / meta.rda) * 100));
                            let barColor = "bg-emerald-500";
                            if (pct < 50) barColor = "bg-rose-500";
                            else if (pct < 100) barColor = "bg-amber-400";
                            else if (pct > 150) barColor = "bg-orange-400";
                            const insight = (insights || []).find((i) => i.key === key);
                            return (
                                <div key={key} className="bg-slate-800/60 rounded-2xl p-3 border border-slate-700/50">

                                        <span className="text-sm font-bold text-slate-200">{meta.label}</span>
                                        <span className="text-xs text-slate-400">

                    {title && <p className="text-xs font-bold text-slate-400">{title}</p>}

                        {keys.map((key) => {
                            const meta = referenceMap[key];
                            const amount = Number(minerals?.[key]) || 0;
                            const pct = Math.min(200, Math.round((amount / meta.rda) * 100));

                            return (
                                <div key={key} className="bg-slate-800/60 rounded-2xl p-3 border border-slate-700/50">
                                    <div className="flex justify-between items-baseline gap-2">
                                        <span className="text-sm font-bold text-slate-200">{meta.label}</span>
                                        <span className="text-xs text-slate-400">
                                            {amount.toFixed(1)}{meta.unit}
                                            <span className="text-slate-500"> / 目安 {meta.rda}{meta.unit}</span>
                                        </span>
                                    </div>
                                    <div className="mt-2 h-2 rounded-full bg-slate-900 overflow-hidden">
                                        <div className={`h-full rounded-full ${barColor}`} style={{ width: `${Math.min(100, pct)}%` }} />
                                    </div>
                                    <p className="text-[10px] text-slate-500 mt-1">摂取目安に対し 約{pct}%</p>
                                    {insight && (
                                        <div className="mt-2 text-xs text-slate-300 border-t border-slate-700/50 pt-2">
                                            <span className="text-cyan-400/90 font-bold">{insight.status}</span>
                                            {insight.note && <span className="text-slate-400"> — {insight.note}</span>}
                                            {insight.food_sources?.length > 0 && (
                                                <p className="text-slate-500 mt-1">補える食材: {insight.food_sources.join("、")}</p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function Dashboard({ user, profile, setProfile }) {
            const [mealLogs, setMealLogs] = React.useState([]);
            const [loadingMeals, setLoadingMeals] = React.useState(true);
            const [sheetOpen, setSheetOpen] = React.useState(false);
            const [profileOpen, setProfileOpen] = React.useState(false);
            const [editName, setEditName] = React.useState(profile?.name || "");
            const [editWeight, setEditWeight] = React.useState(String(profile?.weight ?? ""));
            const [editGoal, setEditGoal] = React.useState(String(profile?.goalWeight ?? ""));
            const [editSex, setEditSex] = React.useState(profile?.sex || "female");
            const [editAge, setEditAge] = React.useState(String(profile?.age ?? 30));
            const [editGoalMode, setEditGoalMode] = React.useState(profile?.goalMode || "balance");
            const [analyzing, setAnalyzing] = React.useState(false);
            const [recalculating, setRecalculating] = React.useState(false);
            const [error, setError] = React.useState(null);
            const [previewResult, setPreviewResult] = React.useState(null);
            const [previewFile, setPreviewFile] = React.useState(null);
            const [previewUrl, setPreviewUrl] = React.useState(null);
            const [editedMenuText, setEditedMenuText] = React.useState("");
            const [mealType, setMealType] = React.useState("dinner");
            const [historySearch, setHistorySearch] = React.useState("");
            const [historyMealTypeFilter, setHistoryMealTypeFilter] = React.useState("all");
            const [historySort, setHistorySort] = React.useState("newest");
            const [notifyEnabled, setNotifyEnabled] = React.useState(false);
            const cameraInputRef = React.useRef(null);
            const galleryInputRef = React.useRef(null);

            const dailyTarget = suggestedDailyCalories(profile);
            const mealsToday = React.useMemo(() => {
                const start = startOfToday().getTime();
                return mealLogs.filter((m) => {
                    const d = m.createdAt?.toDate ? m.createdAt.toDate() : (m.createdAt ? new Date(m.createdAt) : null);
                    const clientD = m.createdAtClient ? new Date(m.createdAtClient) : null;
                    const t = d?.getTime?.() || clientD?.getTime?.() || 0;
                    return t >= start;
                });
            }, [mealLogs]);
            const todayKcal = mealsToday.reduce((s, m) => s + (Number(m.calories_kcal) || 0), 0);
            const remaining = Math.max(0, dailyTarget - todayKcal);
            const pfc = pfcFromMeals(mealsToday);
            const vitSum = sumVitaminsFromMeals(mealsToday);
            const mineralSum = sumMineralsFromMeals(mealsToday);
            const personalizedRda = React.useMemo(() => getPersonalizedRda(profile), [profile]);
            const vitaminScore = micronutrientScore(vitSum, personalizedRda.vitamin);
            const mineralScore = micronutrientScore(mineralSum, personalizedRda.mineral);
            const weeklyMeals = React.useMemo(() => {
                const now = Date.now();
                const weekAgo = now - (7 * 24 * 60 * 60 * 1000);
                return mealLogs.filter((m) => {
                    const d = m.createdAt?.toDate ? m.createdAt.toDate() : (m.createdAt ? new Date(m.createdAt) : null);
                    const clientD = m.createdAtClient ? new Date(m.createdAtClient) : null;
                    const t = d?.getTime?.() || clientD?.getTime?.() || 0;
                    return t >= weekAgo;
                });
            }, [mealLogs]);
            const weeklyPfc = pfcFromMeals(weeklyMeals);
            const weeklyKcalAvg = weeklyMeals.length ? Math.round(weeklyMeals.reduce((s, m) => s + (Number(m.calories_kcal) || 0), 0) / 7) : 0;
            const weekVit = sumVitaminsFromMeals(weeklyMeals);
            const lowVitKeys = Object.keys(personalizedRda.vitamin)
                .map((k) => ({ k, pct: ((Number(weekVit[k]) || 0) / personalizedRda.vitamin[k].rda) * 100 }))
                .sort((a, b) => a.pct - b.pct)
                .slice(0, 3)
                .map(({ k }) => personalizedRda.vitamin[k].label);
            const reminderText = React.useMemo(() => {
                if (!mealLogs.length) return "今日の食事を1件記録して、不足栄養素をチェックしましょう。";
                if (lowVitKeys.length) return `不足しやすい栄養素: ${lowVitKeys.join("、")}。次の食事で補いましょう。`;
                return "栄養バランスは良好です。水分補給も忘れずに。";
            }, [mealLogs.length, lowVitKeys.join("|")]);
            const filteredMealLogs = React.useMemo(() => {
                const q = historySearch.trim().toLowerCase();
                let list = mealLogs.filter((m) => {
                    if (historyMealTypeFilter !== "all" && m.mealType !== historyMealTypeFilter) return false;
                    if (!q) return true;
                    const menuText = (m.menu || []).join(" ").toLowerCase();
                    const commentText = String(m.meal_comment || "").toLowerCase();
                    return menuText.includes(q) || commentText.includes(q);
                });
                list = [...list];
                list.sort((a, b) => {
                    const ad = a.createdAt?.toDate ? a.createdAt.toDate() : (a.createdAtClient ? new Date(a.createdAtClient) : new Date(0));
                    const bd = b.createdAt?.toDate ? b.createdAt.toDate() : (b.createdAtClient ? new Date(b.createdAtClient) : new Date(0));
                    if (historySort === "kcal_desc") return (Number(b.calories_kcal) || 0) - (Number(a.calories_kcal) || 0);
                    if (historySort === "kcal_asc") return (Number(a.calories_kcal) || 0) - (Number(b.calories_kcal) || 0);
                    return bd - ad;
                });
                return list;
            }, [mealLogs, historySearch, historyMealTypeFilter, historySort]);

            const loadMeals = React.useCallback(async () => {
                if (!user?.uid) return;
                setLoadingMeals(true);
                try {
                    const snap = await db.collection("users").doc(user.uid).collection("meals")
                        .orderBy("createdAt", "desc")
                        .limit(200)
                        .get();
                    const list = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                    setMealLogs(list);
                } catch (e) {
                    console.error(e);
                    try {
                        const snap = await db.collection("users").doc(user.uid).collection("meals").limit(200).get();
                        const list = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
                        list.sort((a, b) => {
                            const ad = a.createdAt?.toDate ? a.createdAt.toDate() : (a.createdAtClient ? new Date(a.createdAtClient) : new Date(0));
                            const bd = b.createdAt?.toDate ? b.createdAt.toDate() : (b.createdAtClient ? new Date(b.createdAtClient) : new Date(0));
                            return bd - ad;
                        });
                        setMealLogs(list);
                    } catch (e2) {
                        console.error(e2);
                        setError("食事ログの読み込みに失敗しました。Firestore の権限または設定を確認してください。");
                    }
                }
                setLoadingMeals(false);
            }, [user?.uid]);

            React.useEffect(() => { loadMeals(); }, [loadMeals]);

            React.useEffect(() => {
                if (profileOpen) {
                    setEditName(profile?.name || "");
                    setEditWeight(profile?.weight != null ? String(profile.weight) : "");
                    setEditGoal(profile?.goalWeight != null ? String(profile.goalWeight) : "");
                    setEditSex(profile?.sex || "female");
                    setEditAge(profile?.age != null ? String(profile.age) : "30");
                    setEditGoalMode(profile?.goalMode || "balance");
                }
            }, [profileOpen, profile]);

            const saveProfileEdit = async (e) => {
                e.preventDefault();
                if (!user?.uid) return;
                const w = parseFloat(editWeight);
                const g = parseFloat(editGoal);
                const a = parseInt(editAge, 10);
                const data = {
                    name: (editName.trim() || profile?.name || "ユーザー"),
                    weight: Number.isFinite(w) ? w : (profile?.weight ?? 60),
                    goalWeight: Number.isFinite(g) ? g : (profile?.goalWeight ?? profile?.weight ?? 60),
                    sex: editSex === "male" ? "male" : "female",
                    age: Number.isFinite(a) ? a : (profile?.age ?? 30),
                    goalMode: editGoalMode || "balance",
                };
                await db.collection("users").doc(user.uid).update(data);
                setProfile({ ...profile, ...data });
                setProfileOpen(false);
            };

            const openCamera = () => {
                setError(null);
                setPreviewResult(null);
                if (previewUrl) URL.revokeObjectURL(previewUrl);
                setPreviewUrl(null);
                setPreviewFile(null);
                setSheetOpen(true);
                setEditedMenuText("");
                setMealType("dinner");
            };

            const chooseFromCamera = () => cameraInputRef.current?.click();
            const chooseFromGallery = () => galleryInputRef.current?.click();

            const onFileChange = async (e) => {
                const file = e.target.files?.[0];
                e.target.value = "";
                if (!file || !file.type.startsWith("image/")) {
                    setError("画像ファイルを選んでください");
                    return;
                }
                setPreviewFile(file);
                const url = URL.createObjectURL(file);
                setPreviewUrl(url);
                setAnalyzing(true);
                setError(null);
                try {
                    const dataUrl = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                    const m = /^data:([^;]+);base64,(.+)$/.exec(dataUrl);
                    if (!m) throw new Error("画像の読み込みに失敗しました");
                    const analysis = await analyzeMealWithGemini(m[2], m[1], profile);
                    setPreviewResult(analysis);
                    setEditedMenuText((analysis?.menu || []).join("、"));
                } catch (err) {
                    console.error(err);
                    setError(err.message || "解析に失敗しました");
                }
                setAnalyzing(false);
            };

            const recalculateByEditedMenu = async () => {
                if (!previewResult) return;
                const text = editedMenuText.trim();
                if (!text) {
                    setError("訂正したメニュー名を入力してください");
                    return;
                }
                setRecalculating(true);
                setError(null);
                try {
                    const next = await recalculateMealByMenu(text, profile, previewResult);
                    setPreviewResult(next);
                } catch (err) {
                    console.error(err);
                    setError(err.message || "再計算に失敗しました");
                }
                setRecalculating(false);
            };

            const analyzeFromTextOnly = async () => {
                const text = editedMenuText.trim();
                if (!text) {
                    setError("食べたものをテキストで入力してください");
                    return;
                }
                setRecalculating(true);
                setError(null);
                try {
                    const next = await recalculateMealByMenu(text, profile, {});
                    setPreviewResult(next);
                } catch (err) {
                    console.error(err);
                    setError(err.message || "テキスト解析に失敗しました");
                }
                setRecalculating(false);
            };

            const triggerReminderNotification = async () => {
                try {
                    if (!("Notification" in window)) {
                        setError("このブラウザは通知に対応していません");
                        return;
                    }
                    let permission = Notification.permission;
                    if (permission === "default") {
                        permission = await Notification.requestPermission();
                    }
                    if (permission !== "granted") {
                        setError("通知が許可されていません");
                        return;
                    }
                    new Notification("Vita-Guide リマインド", { body: reminderText });
                    setNotifyEnabled(true);
                } catch (e) {
                    console.error(e);
                    setError("通知の送信に失敗しました");
                }
            };

            const saveMeal = async () => {
                if (!user?.uid || !previewResult) return;
                setAnalyzing(true);
                setError(null);
                try {
                    const mealId = db.collection("users").doc(user.uid).collection("meals").doc().id;
                    const path = `users/${user.uid}/meals/${mealId}.jpg`;
                    let imageUrl = "";
                    if (previewFile) {
                      try {
                        const ref = storage.ref(path);
                        await ref.put(previewFile);
                        imageUrl = await ref.getDownloadURL();
                      } catch (storageErr) {
                        // 画像アップロード失敗でも食事データは保存して履歴に残す
                        console.error(storageErr);
                      }
                    }
                    await db.collection("users").doc(user.uid).collection("meals").doc(mealId).set({
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        createdAtClient: new Date().toISOString(),
                        mealType,
                        imageUrl,
                        menu: editedMenuText.trim() ? editedMenuText.split(/[\s、,]+/).filter(Boolean) : (previewResult.menu || []),
                        calories_kcal: previewResult.calories_kcal,
                        protein_g: previewResult.protein_g,
                        fat_g: previewResult.fat_g,
                        carbs_g: previewResult.carbs_g,
                        vitamins: previewResult.vitamins || {},
                        minerals: previewResult.minerals || {},
                        vitamin_insights: previewResult.vitamin_insights || [],
                        mineral_insights: previewResult.mineral_insights || [],
                        lacking_nutrients: previewResult.lacking_nutrients || [],
                        recommended_foods: previewResult.recommended_foods || [],
                        substitute_suggestions: previewResult.substitute_suggestions || [],
                        improvement_tips: previewResult.improvement_tips || [],
                        confidence_score: previewResult.confidence_score || 0,
                        reminder_message: previewResult.reminder_message || "",
                        meal_comment: previewResult.meal_comment || "",
                        goal_advice: previewResult.goal_advice || ""
                    });
                    if (previewUrl) URL.revokeObjectURL(previewUrl);
                    setPreviewUrl(null);
                    setPreviewFile(null);
                    setPreviewResult(null);
                    setSheetOpen(false);
                    setMealLogs((prev) => [{
                        id: mealId,
                        createdAt: new Date(),
                        createdAtClient: new Date().toISOString(),
                        mealType,
                        imageUrl,
                        menu: editedMenuText.trim() ? editedMenuText.split(/[\s、,]+/).filter(Boolean) : (previewResult.menu || []),
                        calories_kcal: previewResult.calories_kcal,
                        protein_g: previewResult.protein_g,
                        fat_g: previewResult.fat_g,
                        carbs_g: previewResult.carbs_g,
                        vitamins: previewResult.vitamins || {},
                        minerals: previewResult.minerals || {},
                        vitamin_insights: previewResult.vitamin_insights || [],
                        mineral_insights: previewResult.mineral_insights || [],
                        lacking_nutrients: previewResult.lacking_nutrients || [],
                        recommended_foods: previewResult.recommended_foods || [],
                        substitute_suggestions: previewResult.substitute_suggestions || [],
                        improvement_tips: previewResult.improvement_tips || [],
                        confidence_score: previewResult.confidence_score || 0,
                        reminder_message: previewResult.reminder_message || "",
                        meal_comment: previewResult.meal_comment || "",
                        goal_advice: previewResult.goal_advice || ""
                    }, ...prev]);
                    await loadMeals();
                    if (!imageUrl) {
                        setError("画像アップロードに失敗したため、テキストデータのみ保存しました。");
                    }
                } catch (err) {
                    console.error(err);
                    setError("保存に失敗しました（Storage / Firestore の権限を確認してください）");
                }
                setAnalyzing(false);
            };

            const discardPreview = () => {
                if (previewUrl) URL.revokeObjectURL(previewUrl);
                setPreviewUrl(null);
                setPreviewFile(null);
                setPreviewResult(null);
                setSheetOpen(false);
            };

            return (
                <div className="max-w-lg mx-auto min-h-screen pb-36 px-4 pt-6 bg-gradient-to-b from-slate-950 via-slate-900 to-slate-950">
                    <input
                        ref={cameraInputRef}
                        type="file"
                        accept="image/*"
                        capture="environment"
                        className="hidden"
                        onChange={onFileChange}
                    />
                    <input
                        ref={galleryInputRef}
                        type="file"
                        accept="image/*"
                        className="hidden"
                        onChange={onFileChange}
                    />

                    <header className="mb-6 flex justify-between items-start gap-3">
                        <div className="min-w-0">
                            <p className="text-xs font-bold text-cyan-400/80 tracking-widest">HELLO</p>
                            <h1 className="text-3xl font-black text-white tracking-tight truncate">{profile?.name}</h1>
                            <p className="text-xs text-slate-500 mt-1">
                                {(profile?.weight != null ? profile.weight : "?")} kg
                                <span className="text-slate-600"> · </span>
                                目標{" "}
                                {profile?.goalWeight != null ? `${profile.goalWeight} kg` : "未設定"}
                                <span className="text-slate-600"> · </span>
                                {profile?.sex === "male" ? "男性" : profile?.sex === "female" ? "女性" : "性別未設定"}
                                <span className="text-slate-600"> · </span>
                                {profile?.age ?? "?"}歳
                                <span className="text-slate-600"> · </span>
                                {profile?.goalMode === "cut" ? "減量" : profile?.goalMode === "bulk" ? "増量" : profile?.goalMode === "health" ? "体調改善" : "維持"}
                            </p>
                        </div>
                        <div className="flex flex-col items-end gap-2 shrink-0">
                            <button
                                type="button"
                                onClick={() => setProfileOpen(true)}
                                className="text-xs font-bold text-cyan-400/90 border border-cyan-500/30 rounded-full px-3 py-1.5 hover:bg-cyan-500/10"
                            >
                                プロフィール
                            </button>
                            <div className="text-right text-[10px] text-slate-500 max-w-[140px]">
                                匿名<br />
                                <span className="break-all text-slate-600">{user?.uid?.slice(0, 10)}…</span>
                            </div>
                        </div>
                    </header>

                    <div className="glass-card rounded-3xl p-6 mb-4 animate-fadeIn">
                        <p className="text-xs font-bold text-slate-400 mb-1">今日の摂取カロリー</p>
                        <div className="flex items-baseline gap-2">
                            <span className="text-5xl font-black text-white tabular-nums">{Math.round(todayKcal)}</span>
                            <span className="text-lg font-bold text-slate-500">/ {dailyTarget} kcal</span>
                        </div>
                        <p className="text-sm text-cyan-300/90 mt-2 font-semibold">
                            残り約 {Math.round(remaining)} kcal（目安・活動量は個人差あり）
                        </p>
                        {mealsToday.length > 0 && (
                            <div className="mt-4 pt-4 border-t border-slate-700/50">
                                <PfcBars pPct={pfc.pPct} fPct={pfc.fPct} cPct={pfc.cPct} />
                                <p className="text-[10px] text-slate-500 mt-2">
                                    タンパク質 {pfc.protein_g.toFixed(0)}g / 脂質 {pfc.fat_g.toFixed(0)}g / 炭水 {pfc.carbs_g.toFixed(0)}g（本日分合計）
                                </p>
                            </div>
                        )}
                    </div>

                    <div className="glass-card rounded-3xl p-5 mb-4">
                        <h2 className="text-sm font-black text-white mb-3">五大栄養素バランス（今日）</h2>
                        <div className="grid grid-cols-2 gap-2 text-xs mb-3">
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">タンパク質</p>
                                <p className="text-cyan-300 font-bold">{pfc.protein_g.toFixed(1)} g</p>
                            </div>
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">脂質</p>
                                <p className="text-amber-300 font-bold">{pfc.fat_g.toFixed(1)} g</p>
                            </div>
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">炭水化物</p>
                                <p className="text-violet-300 font-bold">{pfc.carbs_g.toFixed(1)} g</p>
                            </div>
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">合計カロリー</p>
                                <p className="text-emerald-300 font-bold">{Math.round(todayKcal)} kcal</p>
                            </div>
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">ビタミン達成度</p>
                                <p className="text-fuchsia-300 font-bold">{vitaminScore}%</p>
                            </div>
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">ミネラル達成度</p>
                                <p className="text-teal-300 font-bold">{mineralScore}%</p>
                            </div>
                        </div>
                    </div>

                    <div className="glass-card rounded-3xl p-5 mb-4">
                        <h2 className="text-sm font-black text-white mb-3">週次レポート（直近7日）</h2>
                        <div className="grid grid-cols-2 gap-2 text-xs">
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">平均カロリー/日</p>
                                <p className="text-emerald-300 font-bold">{weeklyKcalAvg} kcal</p>
                            </div>
                            <div className="rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">PFC(週平均)</p>
                                <p className="text-cyan-300 font-bold">P{weeklyPfc.pPct}% F{weeklyPfc.fPct}% C{weeklyPfc.cPct}%</p>
                            </div>
                            <div className="col-span-2 rounded-2xl p-3 bg-slate-800/60 border border-slate-700/50">
                                <p className="text-slate-500">不足しやすいビタミン</p>
                                <p className="text-rose-300 font-bold">{lowVitKeys.length ? lowVitKeys.join("、") : "データ蓄積中"}</p>
                            </div>
                        </div>
                    </div>

                    <div className="glass-card rounded-3xl p-5 mb-4">
                        <h2 className="text-sm font-black text-white mb-2">不足リマインド</h2>
                        <p className="text-xs text-slate-300">{reminderText}</p>
                        <button
                            type="button"
                            onClick={triggerReminderNotification}
                            className="mt-3 py-2 px-3 rounded-xl border border-cyan-500/40 text-cyan-300 text-xs font-bold"
                        >
                            {notifyEnabled ? "通知を再送する" : "この内容を通知で受け取る"}
                        </button>
                    </div>

                    <div className="glass-card rounded-3xl p-5 mb-4">
                        <h2 className="text-sm font-black text-white mb-3 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#22d3ee]" />
                            今日のビタミン（推定・合計）
                        </h2>
                        {loadingMeals ? (
                            <p className="text-slate-500 text-sm">読み込み中…</p>
                        ) : mealsToday.length === 0 ? (
                            <p className="text-slate-500 text-sm">食事を記録すると、ここに1日の推定合計が表示されます。</p>
                        ) : (
                            <VitaminGrid vitamins={vitSum} insights={null} referenceMap={personalizedRda.vitamin} />
                        )}
                    </div>
                    <div className="glass-card rounded-3xl p-5 mb-4">
                        <h2 className="text-sm font-black text-white mb-3 flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-teal-300 shadow-[0_0_8px_#5eead4]" />
                            今日のミネラル（推定・合計）
                        </h2>
                        {loadingMeals ? (
                            <p className="text-slate-500 text-sm">読み込み中…</p>
                        ) : mealsToday.length === 0 ? (
                            <p className="text-slate-500 text-sm">食事を記録すると、ここに1日の推定合計が表示されます。</p>
                        ) : (
                            <MineralGrid minerals={mineralSum} insights={null} referenceMap={personalizedRda.mineral} />
                        )}
                    </div>

                    <div className="glass-card rounded-3xl p-5 mb-4">
                        <h2 className="text-sm font-black text-white mb-3">食事ログ（履歴）</h2>
                        <div className="grid grid-cols-3 gap-2 mb-3">
                            <input
                                className="col-span-3 bg-slate-900/70 border border-slate-700/60 rounded-xl px-3 py-2 text-xs text-white outline-none focus:border-cyan-500/60"
                                placeholder="メニュー名で検索"
                                value={historySearch}
                                onChange={(e) => setHistorySearch(e.target.value)}
                            />
                            <select
                                className="bg-slate-900/70 border border-slate-700/60 rounded-xl px-2 py-2 text-xs text-white outline-none"
                                value={historyMealTypeFilter}
                                onChange={(e) => setHistoryMealTypeFilter(e.target.value)}
                            >
                                <option value="all">すべて</option>
                                <option value="breakfast">朝食</option>
                                <option value="lunch">昼食</option>
                                <option value="dinner">夕食</option>
                            </select>
                            <select
                                className="col-span-2 bg-slate-900/70 border border-slate-700/60 rounded-xl px-2 py-2 text-xs text-white outline-none"
                                value={historySort}
                                onChange={(e) => setHistorySort(e.target.value)}
                            >
                                <option value="newest">新しい順</option>
                                <option value="kcal_desc">カロリー高い順</option>
                                <option value="kcal_asc">カロリー低い順</option>
                            </select>
                        </div>
                        {error && !sheetOpen && (
                            <p className="text-rose-400 text-xs mb-2">{error}</p>
                        )}
                        {loadingMeals ? (
                            <p className="text-slate-500 text-sm">読み込み中…</p>
                        ) : filteredMealLogs.length === 0 ? (
                            <p className="text-slate-500 text-sm">まだ記録がありません。下のボタンで撮影してください。</p>
                        ) : (
                            <ul className="space-y-3">
                                {filteredMealLogs.map((m) => (
                                    <li key={m.id} className="flex gap-3 bg-slate-800/40 rounded-2xl p-3 border border-slate-700/40">
                                        {m.imageUrl ? (
                                            <img src={m.imageUrl} alt="" className="w-20 h-20 rounded-xl object-cover shrink-0" />
                                        ) : (
                                            <div className="w-20 h-20 rounded-xl bg-slate-800 shrink-0" />
                                        )}
                                        <div className="min-w-0 flex-1">
                                            <p className="text-sm font-bold text-white truncate">{(m.menu || []).join("、")}</p>
                                            <p className="text-xs text-cyan-400/90 font-bold">{m.calories_kcal} kcal</p>
                                            <p className="text-[10px] text-slate-500 mt-0.5">
                                                {m.mealType === "breakfast" ? "朝食" : m.mealType === "lunch" ? "昼食" : m.mealType === "dinner" ? "夕食" : "分類未設定"}
                                            </p>
                                            {m.meal_comment && (
                                                <p className="text-[11px] text-slate-400 mt-1 line-clamp-2">{m.meal_comment}</p>
                                            )}
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>

                    {/* 中央 FAB */}
                    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-40">
                        <div className="flex items-end gap-3">
                            <button
                                type="button"
                                onClick={() => { openCamera(); setPreviewResult(null); setEditedMenuText(""); }}
                                className="w-14 h-14 rounded-full border border-cyan-500/40 text-cyan-300 text-[11px] font-bold bg-slate-900/80"
                            >
                                手入力
                            </button>
                            <button
                                type="button"
                                onClick={openCamera}
                                className="w-24 h-24 rounded-full bg-gradient-to-br from-cyan-400 to-teal-600 flex items-center justify-center glow-ring active:scale-95 transition-transform shadow-2xl"
                                aria-label="食事を撮影"
                            >
                                <svg className="w-11 h-11 text-slate-950" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                                        d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                                        d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                        <p className="text-center text-[10px] text-slate-500 mt-2 font-bold tracking-wider">SCAN / MANUAL</p>
                    </div>

                    {/* 解析シート */}
                    {sheetOpen && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                            <div className="w-full max-w-lg glass-card rounded-3xl max-h-[90vh] overflow-y-auto p-5 animate-fadeIn border-cyan-500/20">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-lg font-black text-white">解析結果</h2>
                                    <button type="button" onClick={discardPreview} className="text-slate-400 text-sm font-bold">閉じる</button>
                                </div>
                                {previewUrl && (
                                    <img src={previewUrl} alt="プレビュー" className="w-full rounded-2xl mb-4 max-h-48 object-cover" />
                                )}
                                {analyzing && !previewResult && (
                                    <div className="flex flex-col items-center py-10">
                                        <div className="w-10 h-10 rounded-full border-2 border-cyan-400/30 border-t-cyan-400 animate-spin mb-3" />
                                        <p className="text-cyan-200/90 text-sm font-semibold">Gemini が栄養・ビタミンを解析中…</p>
                                    </div>
                                )}
                                {error && (
                                    <p className="text-rose-400 text-sm mb-3">{error}</p>
                                )}
                                {previewResult && (
                                    <>
                                        <div className="mb-4">
                                            <p className="text-xs text-slate-500 font-bold">推定メニュー</p>
                                            <p className="text-white font-bold">{(previewResult.menu || []).join("、")}</p>
                                            <p className="text-3xl font-black text-cyan-400 mt-2 tabular-nums">{previewResult.calories_kcal} <span className="text-lg text-slate-400">kcal</span></p>
                                            <p className={`mt-2 text-xs font-bold ${Number(previewResult.confidence_score || 0) < 60 ? "text-amber-300" : "text-emerald-300"}`}>
                                                判定信頼度: {Math.round(Number(previewResult.confidence_score || 0))}%
                                                {Number(previewResult.confidence_score || 0) < 60 ? "（低め: 手動訂正推奨）" : ""}
                                            </p>
                                        </div>
                                        <div className="mb-4 p-3 rounded-2xl bg-slate-800/50 border border-slate-700/50">
                                            <p className="text-xs font-bold text-slate-400 mb-2">判定を訂正</p>
                                            <input
                                                className="w-full bg-slate-900/70 border border-slate-600/50 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-cyan-500/60"
                                                value={editedMenuText}
                                                onChange={(e) => setEditedMenuText(e.target.value)}
                                                placeholder="例: 鮭おにぎり 味噌汁 サラダ"
                                            />
                                            <div className="flex gap-2 mt-2">
                                                <button
                                                    type="button"
                                                    onClick={recalculateByEditedMenu}
                                                    disabled={recalculating}
                                                    className="py-2 px-3 rounded-xl border border-cyan-500/40 text-cyan-300 text-xs font-bold disabled:opacity-50"
                                                >
                                                    {recalculating ? "再計算中…" : "訂正内容で再計算"}
                                                </button>
                                            </div>
                                            <div className="grid grid-cols-3 gap-2 mt-3">
                                                <button type="button" onClick={() => setMealType("breakfast")} className={`py-2 rounded-xl text-xs font-bold border ${mealType === "breakfast" ? "bg-cyan-500/20 border-cyan-400 text-cyan-300" : "border-slate-600 text-slate-300"}`}>朝食</button>
                                                <button type="button" onClick={() => setMealType("lunch")} className={`py-2 rounded-xl text-xs font-bold border ${mealType === "lunch" ? "bg-cyan-500/20 border-cyan-400 text-cyan-300" : "border-slate-600 text-slate-300"}`}>昼食</button>
                                                <button type="button" onClick={() => setMealType("dinner")} className={`py-2 rounded-xl text-xs font-bold border ${mealType === "dinner" ? "bg-cyan-500/20 border-cyan-400 text-cyan-300" : "border-slate-600 text-slate-300"}`}>夕食</button>
                                            </div>
                                        </div>
                                        <div className="mb-4 p-3 rounded-2xl bg-slate-800/50 border border-slate-700/50">
                                            <PfcBars {...pfcPercents(previewResult.protein_g, previewResult.fat_g, previewResult.carbs_g)} />
                                            <div className="grid grid-cols-2 gap-2 mt-3 text-xs">
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">タンパク質</p>
                                                    <p className="text-cyan-300 font-bold">{Number(previewResult.protein_g || 0).toFixed(1)} g</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">脂質</p>
                                                    <p className="text-amber-300 font-bold">{Number(previewResult.fat_g || 0).toFixed(1)} g</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">炭水化物</p>
                                                    <p className="text-violet-300 font-bold">{Number(previewResult.carbs_g || 0).toFixed(1)} g</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">合計カロリー</p>
                                                    <p className="text-emerald-300 font-bold">{Math.round(Number(previewResult.calories_kcal || 0))} kcal</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="mb-4 p-3 rounded-2xl bg-slate-800/50 border border-slate-700/50">
                                            <p className="text-xs font-bold text-slate-400 mb-2">五大栄養素（この食事）</p>
                                            <div className="grid grid-cols-2 gap-2 text-xs">
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">タンパク質</p>
                                                    <p className="text-cyan-300 font-bold">{Number(previewResult.protein_g || 0).toFixed(1)} g</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">脂質</p>
                                                    <p className="text-amber-300 font-bold">{Number(previewResult.fat_g || 0).toFixed(1)} g</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">炭水化物</p>
                                                    <p className="text-violet-300 font-bold">{Number(previewResult.carbs_g || 0).toFixed(1)} g</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">合計カロリー</p>
                                                    <p className="text-emerald-300 font-bold">{Math.round(Number(previewResult.calories_kcal || 0))} kcal</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">ビタミン（総合）</p>
                                                    <p className="text-fuchsia-300 font-bold">{micronutrientScore(previewResult.vitamins || {}, personalizedRda.vitamin)}%</p>
                                                </div>
                                                <div className="rounded-xl bg-slate-900/70 p-2 border border-slate-700/50">
                                                    <p className="text-slate-500">ミネラル（総合）</p>
                                                    <p className="text-teal-300 font-bold">{micronutrientScore(previewResult.minerals || {}, personalizedRda.mineral)}%</p>
                                                </div>
                                            </div>
                                        </div>
                                        {(previewResult.meal_comment || previewResult.goal_advice) && (
                                            <div className="mb-4 text-sm text-slate-300 space-y-2">
                                                {previewResult.meal_comment && (
                                                    <p><span className="text-slate-500 font-bold">食事コメント</span><br />{previewResult.meal_comment}</p>
                                                )}
                                                {previewResult.goal_advice && (
                                                    <p><span className="text-slate-500 font-bold">目標向けアドバイス</span><br />{previewResult.goal_advice}</p>
                                                )}
                                            </div>
                                        )}
                                        {(previewResult.lacking_nutrients?.length > 0 || previewResult.recommended_foods?.length > 0 || previewResult.improvement_tips?.length > 0) && (
                                            <div className="mb-4 p-3 rounded-2xl bg-slate-800/50 border border-slate-700/50 text-sm space-y-2">
                                                <p className="text-slate-300 font-bold">改善アドバイス</p>
                                                {previewResult.lacking_nutrients?.length > 0 && (
                                                    <p className="text-rose-300 text-xs">
                                                        不足しやすい栄養素: {previewResult.lacking_nutrients.join("、")}
                                                    </p>
                                                )}
                                                {previewResult.recommended_foods?.length > 0 && (
                                                    <p className="text-emerald-300 text-xs">
                                                        次におすすめの食材: {previewResult.recommended_foods.join("、")}
                                                    </p>
                                                )}
                                                {previewResult.improvement_tips?.length > 0 && (
                                                    <ul className="space-y-1">
                                                        {previewResult.improvement_tips.slice(0, 4).map((tip, idx) => (
                                                            <li key={idx} className="text-slate-300 text-xs">・{tip}</li>
                                                        ))}
                                                    </ul>
                                                )}
                                            </div>
                                        )}
                                        {previewResult.substitute_suggestions?.length > 0 && (
                                            <div className="mb-4 p-3 rounded-2xl bg-slate-800/50 border border-slate-700/50 text-sm">
                                                <p className="text-slate-300 font-bold mb-2">食材の代替提案</p>
                                                <ul className="space-y-1">
                                                    {previewResult.substitute_suggestions.slice(0, 4).map((x, i) => (
                                                        <li key={i} className="text-slate-300 text-xs">・{x}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        )}
                                        <div className="mb-6">
                                            <h3 className="text-sm font-black text-white mb-2 flex items-center gap-2">
                                                ビタミン詳細（この食事）
                                            </h3>
                                            <VitaminGrid
                                                vitamins={previewResult.vitamins}
                                                insights={previewResult.vitamin_insights}
                                                referenceMap={personalizedRda.vitamin}
                                            />
                                        </div>
                                        <div className="mb-6">
                                            <h3 className="text-sm font-black text-white mb-2 flex items-center gap-2">
                                                ミネラル詳細（この食事）
                                            </h3>
                                            <MineralGrid
                                                minerals={previewResult.minerals}
                                                insights={previewResult.mineral_insights}
                                                referenceMap={personalizedRda.mineral}
                                            />
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                type="button"
                                                onClick={discardPreview}
                                                className="flex-1 py-3 rounded-2xl border border-slate-600 text-slate-300 font-bold text-sm"
                                            >
                                                破棄
                                            </button>
                                            <button
                                                type="button"
                                                onClick={saveMeal}
                                                disabled={analyzing || recalculating}
                                                className="flex-1 py-3 rounded-2xl bg-gradient-to-r from-cyan-500 to-teal-500 text-slate-950 font-black text-sm disabled:opacity-50"
                                            >
                                                記録に保存
                                            </button>
                                        </div>
                                    </>
                                )}
                                {!previewResult && !analyzing && (
                                    <div className="space-y-3">
                                        <div className="p-3 rounded-2xl bg-slate-900/70 border border-slate-700/60">
                                            <p className="text-xs text-slate-400 font-bold mb-2">手入力で解析</p>
                                            <input
                                                className="w-full bg-slate-900/70 border border-slate-600/50 rounded-xl px-3 py-2 text-sm text-white outline-none focus:border-cyan-500/60"
                                                value={editedMenuText}
                                                onChange={(e) => setEditedMenuText(e.target.value)}
                                                placeholder="例: サバ定食、納豆、味噌汁"
                                            />
                                            <button
                                                type="button"
                                                onClick={analyzeFromTextOnly}
                                                disabled={recalculating}
                                                className="mt-2 w-full py-2 rounded-xl border border-cyan-500/40 text-cyan-300 font-bold text-xs disabled:opacity-50"
                                            >
                                                {recalculating ? "解析中…" : "入力内容で解析"}
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                        <button
                                            type="button"
                                            onClick={chooseFromCamera}
                                            className="w-full py-3 rounded-2xl border border-cyan-500/40 text-cyan-300 font-bold text-sm"
                                        >
                                            カメラで撮影
                                        </button>
                                        <button
                                            type="button"
                                            onClick={chooseFromGallery}
                                            className="w-full py-3 rounded-2xl border border-teal-500/40 text-teal-300 font-bold text-sm"
                                        >
                                            アルバムから選択
                                        </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {profileOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/70 backdrop-blur-sm p-4">
                            <div className="w-full max-w-md glass-card rounded-3xl p-6 animate-fadeIn border-cyan-500/20">
                                <h2 className="text-lg font-black text-white mb-1">プロフィール編集</h2>
                                <p className="text-xs text-slate-500 mb-4">目標体重を設定すると、カロリー目安と AI コメントが調整されます。</p>
                                <form onSubmit={saveProfileEdit} className="space-y-3">
                                    <div>
                                        <label className="text-xs text-slate-500 font-bold">ニックネーム</label>
                                        <input
                                            className="mt-1 w-full bg-slate-800/80 border border-slate-600/50 rounded-2xl px-4 py-3 text-white outline-none focus:border-cyan-500/60"
                                            value={editName}
                                            onChange={(e) => setEditName(e.target.value)}
                                            required
                                        />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold">体重 (kg)</label>
                                            <input
                                                type="number"
                                                step="0.1"
                                                className="mt-1 w-full bg-slate-800/80 border border-slate-600/50 rounded-2xl px-4 py-3 text-white outline-none focus:border-cyan-500/60"
                                                value={editWeight}
                                                onChange={(e) => setEditWeight(e.target.value)}
                                                required
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold">目標 (kg)</label>
                                            <input
                                                type="number"
                                                step="0.1"
                                                className="mt-1 w-full bg-slate-800/80 border border-slate-600/50 rounded-2xl px-4 py-3 text-white outline-none focus:border-cyan-500/60"
                                                value={editGoal}
                                                onChange={(e) => setEditGoal(e.target.value)}
                                                required
                                            />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="text-xs text-slate-500 font-bold">目標モード</label>
                                        <select
                                            className="mt-1 w-full bg-slate-800/80 border border-slate-600/50 rounded-2xl px-4 py-3 text-white outline-none focus:border-cyan-500/60"
                                            value={editGoalMode}
                                            onChange={(e) => setEditGoalMode(e.target.value)}
                                        >
                                            <option value="balance">維持（バランス）</option>
                                            <option value="cut">減量</option>
                                            <option value="bulk">増量</option>
                                            <option value="health">体調改善</option>
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold">性別</label>
                                            <select
                                                className="mt-1 w-full bg-slate-800/80 border border-slate-600/50 rounded-2xl px-4 py-3 text-white outline-none focus:border-cyan-500/60"
                                                value={editSex}
                                                onChange={(e) => setEditSex(e.target.value)}
                                            >
                                                <option value="female">女性</option>
                                                <option value="male">男性</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold">年齢</label>
                                            <input
                                                type="number"
                                                min="10"
                                                max="100"
                                                className="mt-1 w-full bg-slate-800/80 border border-slate-600/50 rounded-2xl px-4 py-3 text-white outline-none focus:border-cyan-500/60"
                                                value={editAge}
                                                onChange={(e) => setEditAge(e.target.value)}
                                                required
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-2 pt-2">
                                        <button
                                            type="button"
                                            onClick={() => setProfileOpen(false)}
                                            className="flex-1 py-3 rounded-2xl border border-slate-600 text-slate-300 font-bold text-sm"
                                        >
                                            閉じる
                                        </button>
                                        <button
                                            type="submit"
                                            className="flex-1 py-3 rounded-2xl bg-gradient-to-r from-cyan-500 to-teal-500 text-slate-950 font-black text-sm"
                                        >
                                            保存
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
